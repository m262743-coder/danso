
            <!DOCTYPE html>
            <html lang="ja">
            <head>
                <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
                <title>3D断層形成シミュレーター</title>
                <style>
                    body {
                        margin: 0;
                        padding: 0;
                        overflow: hidden;
                        font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", sans-serif;
                        background-color: #1e272e;
                        color: #f5f6fa;
                    }
                    #canvas-container {
                        width: 100vw;
                        height: 100vh;
                        display: block;
                    }
                    .ui-panel {
                        position: absolute;
                        top: 20px;
                        left: 20px;
                        background: rgba(30, 39, 46, 0.95);
                        padding: 24px;
                        border-radius: 16px;
                        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
                        width: 330px;
                        backdrop-filter: blur(10px);
                        border: 1px solid rgba(255,255,255,0.1);
                        z-index: 10;
                        box-sizing: border-box;
                    }
                    h1 {
                        font-size: 18px;
                        margin: 0 0 15px 0;
                        color: #00d2d3;
                        border-bottom: 3px solid #576574;
                        padding-bottom: 8px;
                    }
                    .control-group {
                        margin-bottom: 18px;
                    }
                    label {
                        display: block;
                        font-size: 12px;
                        font-weight: bold;
                        color: #c8d6e5;
                        margin-bottom: 8px;
                    }
                    select, button {
                        width: 100%;
                        padding: 12px;
                        font-size: 13px;
                        border-radius: 8px;
                        border: 1px solid #576574;
                        background-color: #2f3542;
                        color: #f5f6fa;
                        cursor: pointer;
                        box-sizing: border-box;
                        margin-bottom: 8px;
                        transition: all 0.2s;
                        font-weight: bold;
                    }
                    select:hover {
                        border-color: #00d2d3;
                    }
                    button.action-btn {
                        background-color: #00d2d3;
                        color: #1e272e;
                        border: none;
                    }
                    button.action-btn:hover {
                        background-color: #01a3a4;
                        transform: translateY(-1px);
                    }
                    button.reset-btn {
                        background-color: #576574;
                        color: #f5f6fa;
                        border: none;
                    }
                    button.reset-btn:hover {
                        background-color: #8395a7;
                    }
                    .slider-container {
                        margin-top: 10px;
                        background: #2f3542;
                        padding: 12px;
                        border-radius: 8px;
                    }
                    input[type="range"] {
                        width: 100%;
                        margin: 10px 0;
                        cursor: pointer;
                    }
                    .legend {
                        font-size: 11px;
                        margin-top: 10px;
                        padding: 8px;
                        background: #2f3542;
                        border-radius: 6px;
                        border: 1px solid #576574;
                    }
                    .legend-item {
                        display: flex;
                        align-items: center;
                        margin-bottom: 6px;
                    }
                    .legend-color {
                        width: 16px;
                        height: 12px;
                        margin-right: 8px;
                        border-radius: 2px;
                        display: inline-block;
                    }
                    .legend-color.primary {
                        background: #ff3838;
                    }
                    .legend-color.secondary {
                        background: repeating-linear-gradient(90deg, #54a0ff, #54a0ff 3px, transparent 3px, transparent 6px);
                        border: 1px solid #54a0ff;
                    }
                    .navigation-hint {
                        position: absolute;
                        bottom: 20px;
                        left: 50%;
                        transform: translateX(-50%);
                        background: rgba(30, 39, 46, 0.9);
                        color: white;
                        padding: 10px 20px;
                        border-radius: 30px;
                        font-size: 12px;
                        pointer-events: none;
                        z-index: 10;
                    }

                    /* スマホ表示向けの画面%指定レスポンシブデザイン */
                    @media (max-width: 600px) {
                        .ui-panel {
                            top: 2vh;
                            left: 50%;
                            transform: translateX(-50%);
                            width: 80vw; /* 画面幅の80% */
                            max-height: 35vh; /* 画面高さの35%以内に制限 */
                            overflow-y: auto;
                            padding: 3vw;
                            border-radius: 12px;
                        }
                        h1 {
                            font-size: 3.8vw;
                            margin-bottom: 1.5vh;
                            padding-bottom: 0.5vh;
                        }
                        .control-group {
                            margin-bottom: 1.2vh;
                        }
                        label {
                            font-size: 2.8vw;
                            margin-bottom: 0.5vh;
                        }
                        select, button {
                            width: 100%; /* パネル幅(80vw)に対して100% */
                            padding: 1.2vh 2vw;
                            font-size: 3vw;
                            margin-bottom: 0.8vh;
                            border-radius: 6px;
                        }
                        .slider-container {
                            padding: 1vh 2vw;
                            margin-top: 0.5vh;
                        }
                        input[type="range"] {
                            margin: 0.5vh 0;
                        }
                        .legend {
                            font-size: 2.5vw;
                            padding: 1vh;
                            margin-top: 0.8vh;
                        }
                        .navigation-hint {
                            bottom: 2vh;
                            font-size: 2.6vw;
                            padding: 0.8vh 3vw;
                            white-space: nowrap;
                            width: auto;
                            max-width: 90vw;
                        }
                    }
                </style>
                <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
                <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
            </head>
            <body>

                <div class="ui-panel">
                    <h1>3D 断層形成シミュレーター</h1>
                    
                    <div class="control-group">
                        <label for="faultType">1. 断層の種類</label>
                        <select id="faultType" onchange="initSimulationState()">
                            <option value="normal">正断層 </option>
                            <option value="reverse">逆断層</option>
                            <option value="strike-slip">左横ずれ断層 </option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label>2. 応力を加えていく</label>
                        <div class="slider-container">
                            <span style="font-size:11px; float:left; color:#8395a7;">応力ゼロ</span>
                            <span style="font-size:11px; float:right; color:#8395a7;"></span>
                            <input type="range" id="forceSlider" min="0" max="100" value="0" oninput="onSliderChange(this.value)">
                        </div>
                    </div>

                    <div class="control-group">
                        <button class="reset-btn" onclick="resetSimulation()">初期状態に戻す</button>
                    </div>

                    <div class="legend">
                        <div class="legend-item">
                            <div class="legend-color primary"></div>
                            <span>主応力（加わる力）</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color secondary"></div>
                            <span>変形・変位方向（結果）</span>
                        </div>
                    </div>
                </div>

                <div class="navigation-hint">
                    🖱️ ドラッグでカメラ回転 ｜ 右ドラッグで移動 ｜ スクロールでズーム
                </div>

                <div id="canvas-container"></div>

                <script>
                    let scene, camera, renderer, controls;
                    let leftGroup, rightGroup;
                    let arrowGroup;
                    let arrows = [];
                    
                    let animationProgress = 0;
                    let isAnimating = false;

                    function init3D() {
                        const container = document.getElementById('canvas-container');
                        scene = new THREE.Scene();
                        scene.background = new THREE.Color(0x1e272e);

                        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
                        camera.position.set(13, 9, 13);

                        renderer = new THREE.WebGLRenderer({ antialias: true });
                        renderer.setSize(window.innerWidth, window.innerHeight);
                        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                        container.appendChild(renderer.domElement);

                        controls = new THREE.OrbitControls(camera, renderer.domElement);
                        controls.enableDamping = true;
                        controls.dampingFactor = 0.05;
                        controls.maxPolarAngle = Math.PI / 2 - 0.05;

                        const gridHelper = new THREE.GridHelper(30, 30, 0x576574, 0x2f3542);
                        gridHelper.position.y = -3.01;
                        scene.add(gridHelper);

                        arrowGroup = new THREE.Group();
                        scene.add(arrowGroup);

                        buildStrata();
                        updateArrows();

                        window.addEventListener('resize', onWindowResize);
                        animate();
                    }

                    function buildStrata() {
                        if (leftGroup) scene.remove(leftGroup);
                        if (rightGroup) scene.remove(rightGroup);

                        leftGroup = new THREE.Group();
                        rightGroup = new THREE.Group();

                        const type = document.getElementById('faultType').value;
                        const layerColors = [0xffffff, 0x5c4033, 0xffffff];
                        const layerHeight = 1.3;
                        const depth = 5.0;
                        
                        const topX = (type === 'strike-slip') ? 0.0 : 0.5;
                        const botX = (type === 'strike-slip') ? 0.0 : -1.8;

                        layerColors.forEach((color, i) => {
                            const mat = new THREE.MeshBasicMaterial({ 
                                color: color, 
                                side: THREE.DoubleSide
                            });

                            const yTop = 2.0 - (i * layerHeight);
                            const yBot = yTop - layerHeight;

                            const calcX = (y) => {
                                if (type === 'strike-slip') return 0;
                                const t = (y - (-2)) / 4; 
                                return botX + (topX - botX) * t;
                            };

                            const xTopSplit = calcX(yTop);
                            const xBotSplit = calcX(yBot);

                            const zFront = depth / 2;
                            const zBack = -depth / 2;

                            // 左側ブロック
                            const leftGeom = new THREE.BufferGeometry();
                            const vertices = new Float32Array([
                                -4, yTop, zFront,   xTopSplit, yTop, zFront,   xBotSplit, yBot, zFront,
                                -4, yTop, zFront,   xBotSplit, yBot, zFront,   -4, yBot, zFront,
                                -4, yTop, zBack,    xBotSplit, yBot, zBack,    xTopSplit, yTop, zBack,
                                -4, yTop, zBack,    -4, yBot, zBack,       xBotSplit, yBot, zBack,
                                -4, yTop, zFront,   -4, yTop, zBack,       xTopSplit, yTop, zBack,
                                -4, yTop, zFront,   xTopSplit, yTop, zBack,    xTopSplit, yTop, zFront,
                                -4, yBot, zFront,   xBotSplit, yBot, zBack,    -4, yBot, zBack,
                                -4, yBot, zFront,   xBotSplit, yBot, zFront,   xBotSplit, yBot, zBack,
                                -4, yTop, zFront,   -4, yBot, zBack,       -4, yTop, zBack,
                                -4, yTop, zFront,   -4, yBot, zFront,      -4, yBot, zBack,
                                xTopSplit, yTop, zFront, xTopSplit, yTop, zBack,   xBotSplit, yBot, zBack,
                                xTopSplit, yTop, zFront, xBotSplit, yBot, zBack,   xBotSplit, yBot, zFront
                            ]);
                            leftGeom.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
                            leftGeom.computeVertexNormals();
                            const leftMesh = new THREE.Mesh(leftGeom, mat);
                            leftGroup.add(leftMesh);

                            // 右側ブロック
                            const rightGeom = new THREE.BufferGeometry();
                            const rVertices = new Float32Array([
                                xTopSplit, yTop, zFront,   4, yTop, zFront,   4, yBot, zFront,
                                xTopSplit, yTop, zFront,   4, yBot, zFront,   xBotSplit, yBot, zFront,
                                xTopSplit, yTop, zBack,    4, yBot, zBack,    4, yTop, zBack,
                                xTopSplit, yTop, zBack,    xBotSplit, yBot, zBack, 4, yBot, zBack,
                                xTopSplit, yTop, zFront,   xTopSplit, yTop, zBack, 4, yTop, zBack,
                                xTopSplit, yTop, zFront,   4, yTop, zBack,    4, yTop, zFront,
                                xBotSplit, yBot, zFront,   4, yBot, zBack,    xBotSplit, yBot, zBack,
                                xBotSplit, yBot, zFront,   4, yBot, zFront,   4, yBot, zBack,
                                4, yTop, zFront,       4, yTop, zBack,    4, yBot, zBack,
                                4, yTop, zFront,       4, yBot, zBack,    4, yBot, zFront,
                                xTopSplit, yTop, zFront,   xBotSplit, yBot, zBack, xTopSplit, yTop, zBack,
                                xTopSplit, yTop, zFront,   xBotSplit, yBot, zFront, xBotSplit, yBot, zBack
                            ]);
                            rightGeom.setAttribute('position', new THREE.BufferAttribute(rVertices, 3));
                            rightGeom.computeVertexNormals();
                            const rightMesh = new THREE.Mesh(rightGeom, mat);
                            rightGroup.add(rightMesh);
                        });

                        scene.add(leftGroup);
                        scene.add(rightGroup);
                    }

                    function updateArrows() {
                        while(arrows.length > 0) {
                            const arr = arrows.pop();
                            arrowGroup.remove(arr);
                        }

                        const type = document.getElementById('faultType').value;
                        const primaryColor = 0xff3838;   // 主応力（赤）
                        const secondaryColor = 0x54a0ff; // 変形・変位（青）

                        if (type === 'normal') {
                            addArrow(new THREE.Vector3(-5.2, 0, 0), new THREE.Vector3(-1, 0, 0), 1.8, primaryColor, 'left', true);
                            addArrow(new THREE.Vector3(5.2, 0, 0), new THREE.Vector3(1, 0, 0), 1.8, primaryColor, 'right', true);

                            addArrow(new THREE.Vector3(-2.2, 3.8, 0), new THREE.Vector3(0, -1, 0), 1.8, secondaryColor, 'left', false);
                            addArrow(new THREE.Vector3(2.2, -3.7, 0), new THREE.Vector3(0, 1, 0), 1.8, secondaryColor, 'right', false);

                        } else if (type === 'reverse') {
                            addArrow(new THREE.Vector3(-5.5, 0, 0), new THREE.Vector3(1, 0, 0), 1.8, primaryColor, 'left', true);
                            addArrow(new THREE.Vector3(5.5, 0, 0), new THREE.Vector3(-1, 0, 0), 1.8, primaryColor, 'right', true);

                            addArrow(new THREE.Vector3(-2.2, 2.0, 0), new THREE.Vector3(0, 1, 0), 1.8, secondaryColor, 'left', false);
                            addArrow(new THREE.Vector3(2.2, -2.0, 0), new THREE.Vector3(0, -1, 0), 1.8, secondaryColor, 'right', false);

                        } else if (type === 'strike-slip') {
                            addArrow(new THREE.Vector3(-5.5, 0, 0), new THREE.Vector3(1, 0, 0), 1.8, primaryColor, 'left', true);
                            addArrow(new THREE.Vector3(5.5, 0, 0), new THREE.Vector3(-1, 0, 0), 1.8, primaryColor, 'right', true);

                            addArrow(new THREE.Vector3(-2.0, 0, 3.5), new THREE.Vector3(0, 0, 1), 1.8, secondaryColor, 'left', false);
                            addArrow(new THREE.Vector3(2.0, 0, -3.5), new THREE.Vector3(0, 0, -1), 1.8, secondaryColor, 'right', false);
                        }

                        applyTransformation();
                    }

                    function addArrow(origin, dir, length, color, followBlock, isPrimary) {
                        const arrowContainer = new THREE.Group();
                        
                        if (isPrimary) {
                            const arrowHelper = new THREE.ArrowHelper(dir.clone().normalize(), origin, length, color, 0.6, 0.4);
                            arrowHelper.line.material.linewidth = 8;
                            arrowContainer.add(arrowHelper);
                        } else {
                            const normDir = dir.clone().normalize();
                            const headLength = 0.4;
                            const shaftLength = Math.max(0.1, length - headLength);

                            const startPos = origin.clone();
                            const endPos = origin.clone().add(normDir.clone().multiplyScalar(shaftLength));

                            const geometry = new THREE.BufferGeometry().setFromPoints([startPos, endPos]);
                            const material = new THREE.LineDashedMaterial({
                                color: color,
                                linewidth: 3,
                                scale: 1,
                                dashSize: 0.2,
                                gapSize: 0.15
                            });
                            const dashedLine = new THREE.Line(geometry, material);
                            dashedLine.computeLineDistances();
                            arrowContainer.add(dashedLine);

                            const coneGeo = new THREE.ConeGeometry(0.18, headLength, 12);
                            const coneMat = new THREE.MeshBasicMaterial({ color: color });
                            const cone = new THREE.Mesh(coneGeo, coneMat);

                            const headPos = origin.clone().add(normDir.clone().multiplyScalar(shaftLength + headLength / 2));
                            cone.position.copy(headPos);

                            const quaternion = new THREE.Quaternion();
                            quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), normDir);
                            cone.quaternion.copy(quaternion);

                            arrowContainer.add(cone);
                        }

                        arrowContainer.userData = {
                            initialOrigin: origin.clone(),
                            followBlock: followBlock,
                            isPrimary: isPrimary
                        };

                        arrowGroup.add(arrowContainer);
                        arrows.push(arrowContainer);
                    }

                    function onSliderChange(value) {
                        animationProgress = value / 100;
                        applyTransformation();
                    }

                    function applyTransformation() {
                        const type = document.getElementById('faultType').value;
                        const p = animationProgress;

                        leftGroup.position.set(0, 0, 0);
                        rightGroup.position.set(0, 0, 0);

                        const slopeLen = Math.sqrt(2.3 * 2.3 + 4.0 * 4.0);
                        const slideDirX = 2.3 / slopeLen;
                        const slideDirY = 4.0 / slopeLen;

                        if (type === 'normal') {
                            const amount = p * 1.5;
                            const halfAmount = amount / 2;
                            
                            rightGroup.position.x = halfAmount * slideDirX;
                            rightGroup.position.y = halfAmount * slideDirY;

                            leftGroup.position.x = -halfAmount * slideDirX;
                            leftGroup.position.y = -halfAmount * slideDirY;

                        } else if (type === 'reverse') {
                            const amount = p * 1.5;
                            const halfAmount = amount / 2;
                            
                            rightGroup.position.x = -halfAmount * slideDirX;
                            rightGroup.position.y = -halfAmount * slideDirY;

                            leftGroup.position.x = halfAmount * slideDirX;
                            leftGroup.position.y = halfAmount * slideDirY;

                        } else if (type === 'strike-slip') {
                            const amount = p * 1.5;
                            leftGroup.position.z = amount * 0.6;
                            rightGroup.position.z = -amount * 0.6;
                        }

                        arrows.forEach(arrow => {
                            const follow = arrow.userData.followBlock;
                            const isPrimary = arrow.userData.isPrimary;

                            if (!isPrimary && p === 0) {
                                arrow.visible = false;
                            } else {
                                arrow.visible = true;
                            }

                            if (follow === 'left') {
                                arrow.position.set(
                                    leftGroup.position.x,
                                    leftGroup.position.y,
                                    leftGroup.position.z
                                );
                            } else if (follow === 'right') {
                                arrow.position.set(
                                    rightGroup.position.x,
                                    rightGroup.position.y,
                                    rightGroup.position.z
                                );
                            }
                        });
                    }

                    function resetSimulation() {
                        isAnimating = false;
                        document.getElementById('forceSlider').value = 0;
                        onSliderChange(0);
                    }

                    function initSimulationState() {
                        resetSimulation();
                        buildStrata(); 
                        updateArrows(); 
                    }

                    function animate() {
                        requestAnimationFrame(animate);
                        controls.update();
                        renderer.render(scene, camera);
                    }

                    function onWindowResize() {
                        camera.aspect = window.innerWidth / window.innerHeight;
                        camera.updateProjectionMatrix();
                        renderer.setSize(window.innerWidth, window.innerHeight);
                    }

                    window.onload = function() {
                        init3D();
                        initSimulationState();
                    };
                </script>
            </body>
            </html>
